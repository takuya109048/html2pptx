<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Token Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 4px solid #667eea;
        }

        .stat-card.warning {
            border-left-color: #f59e0b;
        }

        .stat-card.success {
            border-left-color: #10b981;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .stat-detail {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            position: relative;
            height: 400px;
        }

        .log-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 500px;
            overflow-y: auto;
        }

        .log-header {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .log-entry {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }

        .log-action {
            color: #10b981;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #667eea;
            color: white;
        }

        .auto-refresh {
            color: white;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            text-align: right;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="status-indicator"></span>
                Claude Code Token Monitor
            </h1>
            <p>リアルタイムトークン使用量追跡</p>
        </div>

        <div class="controls">
            <button onclick="refreshData()">🔄 更新</button>
            <button onclick="toggleAutoRefresh()">⏱️ 自動更新</button>
            <button onclick="downloadReport()">📥 レポート</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card success">
                <div class="stat-label">総API呼び出し</div>
                <div class="stat-value" id="totalCalls">0</div>
                <div class="stat-detail">本日のセッション</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">推定トークン消費</div>
                <div class="stat-value" id="estimatedTokens">0</div>
                <div class="stat-detail">平均300トークン/呼び出し</div>
            </div>

            <div class="stat-card warning">
                <div class="stat-label">最新呼び出し</div>
                <div class="stat-value" id="lastCall">-</div>
                <div class="stat-detail" id="lastCallDetail">データなし</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">平均呼び出し間隔</div>
                <div class="stat-value" id="avgInterval">-</div>
                <div class="stat-detail">秒単位</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="timelineChart"></canvas>
        </div>

        <div class="log-container">
            <div class="log-header">📋 リアルタイムログ</div>
            <div id="logContent">
                <div class="log-entry">ログを読み込み中...</div>
            </div>
            <div class="timestamp" id="lastUpdate">更新: --:--:--</div>
        </div>

        <div class="auto-refresh">
            自動更新: <span id="autoRefreshStatus">OFF</span> | 更新間隔: 5秒
        </div>
    </div>

    <script>
        let autoRefreshEnabled = false;
        let chartInstance = null;
        let allLogs = [];

        async function refreshData() {
            try {
                const response = await fetch('http://localhost:5555/api/logs');
                const data = await response.json();

                updateStats(data);
                updateLog(data);
                updateChart(data);
                updateTimestamp();
            } catch (error) {
                console.log('ローカルモードで動作中...');
                loadLocalData();
            }
        }

        function updateStats(data) {
            const logs = data.logs || [];
            const totalCalls = logs.length;

            document.getElementById('totalCalls').textContent = totalCalls;
            document.getElementById('estimatedTokens').textContent =
                (totalCalls * 300).toLocaleString();

            if (logs.length > 0) {
                const lastLog = logs[logs.length - 1];
                const lastTime = lastLog.split(']')[0].replace('[', '');
                document.getElementById('lastCall').textContent =
                    lastTime.split(' ')[1];
                document.getElementById('lastCallDetail').textContent =
                    lastTime.split(' ')[0];

                // 平均呼び出し間隔
                if (logs.length > 1) {
                    const intervals = [];
                    for (let i = 1; i < logs.length; i++) {
                        const time1 = extractTime(logs[i-1]);
                        const time2 = extractTime(logs[i]);
                        if (time1 && time2) {
                            intervals.push(time2 - time1);
                        }
                    }
                    const avgInterval = intervals.length > 0
                        ? (intervals.reduce((a,b) => a+b, 0) / intervals.length).toFixed(1)
                        : '-';
                    document.getElementById('avgInterval').textContent = avgInterval;
                }
            }
        }

        function extractTime(logEntry) {
            const match = logEntry.match(/\[.*?(\d+):(\d+):(\d+)\]/);
            if (match) {
                return parseInt(match[1]) * 3600 + parseInt(match[2]) * 60 + parseInt(match[3]);
            }
            return null;
        }

        function updateLog(data) {
            const logs = data.logs || [];
            allLogs = logs;
            const logContent = document.getElementById('logContent');

            if (logs.length === 0) {
                logContent.innerHTML = '<div class="log-entry">ログデータなし</div>';
                return;
            }

            logContent.innerHTML = logs.map((log, index) => {
                const match = log.match(/\[(.*?)\]\s(.*)/);
                if (match) {
                    return `<div class="log-entry">
                        <span class="log-time">${match[1]}</span>
                        <span class="log-action">${match[2]}</span>
                    </div>`;
                }
                return `<div class="log-entry">${log}</div>`;
            }).reverse().join('');
        }

        function updateChart(data) {
            const logs = data.logs || [];
            const hours = {};

            logs.forEach(log => {
                const match = log.match(/\[.*?(\d+):(\d+)/);
                if (match) {
                    const hour = match[1];
                    hours[hour] = (hours[hour] || 0) + 1;
                }
            });

            const labels = Object.keys(hours).sort();
            const values = labels.map(h => hours[h]);

            const ctx = document.getElementById('timelineChart').getContext('2d');

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.map(h => h + ':00'),
                    datasets: [{
                        label: 'API呼び出し数（時間別）',
                        data: values,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: Math.max(...values, 1) + 2,
                        }
                    }
                }
            });
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                `更新: ${now.toLocaleTimeString('ja-JP')}`;
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            document.getElementById('autoRefreshStatus').textContent =
                autoRefreshEnabled ? 'ON' : 'OFF';

            if (autoRefreshEnabled) {
                setInterval(refreshData, 5000);
            }
        }

        function downloadReport() {
            const report = `Claude Code Token Monitor レポート
生成日時: ${new Date().toLocaleString('ja-JP')}

総API呼び出し数: ${document.getElementById('totalCalls').textContent}
推定トークン消費: ${document.getElementById('estimatedTokens').textContent}

【ログ詳細】
${allLogs.join('\n')}
`;

            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `token-report-${Date.now()}.txt`;
            a.click();
        }

        function loadLocalData() {
            // デモモード
            const demoLogs = [
                '[2026-03-28 23:25:31] Tool: API Call',
                '[2026-03-28 23:25:36] Tool: File Read',
                '[2026-03-28 23:25:42] Tool: Code Edit',
                '[2026-03-28 23:26:09] Tool: Bash Execute',
                '[2026-03-28 23:26:10] Tool: Search',
                '[2026-03-28 23:26:13] Tool: Write File',
            ];

            updateStats({ logs: demoLogs });
            updateLog({ logs: demoLogs });
            updateChart({ logs: demoLogs });
            updateTimestamp();
        }

        // 初期ロード
        refreshData();

        // 5秒ごとに自動更新（任意）
        // setInterval(refreshData, 5000);
    </script>
</body>
</html>
