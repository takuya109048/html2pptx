<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Slide</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #e8e8e8; }
  .slide-wrapper {
    width: 100%; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  .slide {
    aspect-ratio: 16 / 9;
    width: min(100vh * 16 / 9, 100vw);
    max-height: 100vh;
    position: relative;
    background: #fff;
    overflow: hidden;
    container-type: inline-size;
  }
  .slide [data-role] { position: absolute; }
</style>
</head>
<body>
<div class="slide-wrapper">
  <div class="slide" id="slide"></div>
</div>

<script>
const SLIDES = [
  {
    "header": {
      "title": "タイトル",
      "message": ""
    },
    "rowHeightRatios": [
      0.35,
      0.65
    ],
    "grid": [
      [
        {
          "type": "plain",
          "markdown": "## 見出し\n\n- テキスト"
        },
        {
          "type": "plain",
          "markdown": "## 見出し\n\n- テキスト"
        }
      ],
      [
        {
          "type": "image",
          "markdown": "画像",
          "span": 2
        }
      ]
    ],
    "logo": "logo.png",
    "page": 1
  }
];
const DESIGN = {
  "COLORS": {
    "headerBg": "4A4A4A",
    "headerText": "FFFFFF",
    "surface": "F5F5F5",
    "text": "333333",
    "textMuted": "888888",
    "border": "E0E0E0",
    "bg": "FFFFFF",
    "area1Bg": "FFFFFF",
    "area2Bg": "FFFFFF",
    "area3Bg": "FFFFFF",
    "bgBox": "E8EDF2",
    "arrow": "6B7A99",
    "stepFill": "D0D0D0",
    "stepBorder": "CCCCCC",
    "stepText": "333333",
    "tableHead": "6B7A99",
    "tableHeadText": "FFFFFF",
    "tableRow": "FFFFFF",
    "tableRowAlt": "F5F5F5",
    "tableText": "333333",
    "tableBorder": "D0D0D0",
    "conclusionBg": "EEF2FF",
    "conclusionBorder": "6B7A99",
    "conclusionText": "1A2A5A",
    "coverTitle": "000000",
    "coverDivider": "000000",
    "coverMeta": "333333"
  },
  "FONTS": {
    "family": "Segoe UI",
    "title": {
      "size": 24,
      "bold": true
    },
    "message": {
      "size": 12,
      "bold": false
    },
    "bgTitle": {
      "size": 13,
      "bold": true
    },
    "bgBody": {
      "size": 12,
      "bold": false
    },
    "bodyHead": {
      "size": 12,
      "bold": true
    },
    "bodyText": {
      "size": 12,
      "bold": false
    },
    "cardTitle": {
      "size": 14,
      "bold": true
    },
    "cardBody": {
      "size": 11,
      "bold": false
    },
    "tableHead": {
      "size": 12,
      "bold": true
    },
    "tableBody": {
      "size": 12,
      "bold": false
    },
    "stepLabel": {
      "size": 14,
      "bold": true
    },
    "bullet": {
      "size": 12,
      "bold": false
    },
    "conclTitle": {
      "size": 13,
      "bold": true
    },
    "conclBody": {
      "size": 12,
      "bold": false
    },
    "coverTitle": {
      "size": 28,
      "bold": true
    },
    "coverMeta": {
      "size": 16,
      "bold": false
    },
    "footer": {
      "size": 10,
      "bold": false
    }
  },
  "LAYOUT": {
    "slideW": 10.0,
    "slideH": 5.625,
    "headerH": 0.85,
    "headerPadX": 0.25,
    "headerPadY": 0.08,
    "footerY": 5.225,
    "footerH": 0.4,
    "footerPadX": 0.25,
    "mainPadX": 0.1,
    "mainPadY": 0.1,
    "gridGap": 0.08,
    "cardPadX": 0.15,
    "cardPadY": 0.12,
    "cardDivY": 0.4,
    "logoH": 0.25,
    "conclusionAccentW": 0.07
  }
};

const D = (() => {
  const L = DESIGN.LAYOUT;
  const px = (inch) => (inch / L.slideW * 100) + "cqw";
  const py = (inch) => (inch / L.slideW * 100) + "cqw";
  return { ...L, "COLORS": DESIGN.COLORS, "FONTS": DESIGN.FONTS, px, py };
})();

(() => {
  const slide = document.getElementById("slide");
  slide.style.fontFamily = `"${D.FONTS.family}", "Meiryo", sans-serif`;
  slide.style.color = "#" + D.COLORS.text;

  const ptToCqw = (pt) => (pt / 720 * 100) + "cqw";
  const pxToCqw = (px) => (px / 960 * 100) + "cqw";

  const mdStyle = document.createElement("style");
  mdStyle.textContent = `
    .md-card { overflow: hidden; }
    .md-card h1, .md-card h2, .md-card h3 {
      font-size: ${ptToCqw(D.FONTS.cardTitle.size)};
      font-weight: 700; line-height: 1.3; margin: 0 0 0.3em 0;
    }
    .md-card p {
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      line-height: 1.6; margin: 0 0 0.3em 0;
    }
    .md-card ul, .md-card ol {
      padding-left: 1.2em;
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      line-height: 1.6; margin: 0;
    }
    .md-card li { margin-bottom: 0.2em; }
    .md-plain { overflow: hidden; }
    .md-plain h1, .md-plain h2, .md-plain h3 {
      font-size: ${ptToCqw(D.FONTS.bodyHead.size)};
      font-weight: 700; line-height: 1.4;
      margin-top: 0.6em; margin-bottom: 0.3em;
    }
    .md-plain h1:first-child, .md-plain h2:first-child, .md-plain h3:first-child { margin-top: 0; }
    .md-plain p {
      font-size: ${ptToCqw(D.FONTS.bodyText.size)};
      line-height: 1.8; margin-bottom: 0.5em;
    }
    .md-plain ul, .md-plain ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bodyText.size)};
      line-height: 1.8;
    }
    .md-plain li { margin-bottom: 0.3em; }
    .md-plain strong { font-weight: 700; }
    .md-plain em { font-style: italic; }
    .md-bg { overflow: hidden; }
    .md-bg h1, .md-bg h2, .md-bg h3 {
      font-size: ${ptToCqw(D.FONTS.bgTitle.size)};
      font-weight: 700; line-height: 1.3;
      margin-bottom: 0.4em; padding-bottom: 0.2em;
      border-bottom: ${pxToCqw(1)} solid #${D.COLORS.border};
    }
    .md-bg p {
      font-size: ${ptToCqw(D.FONTS.bgBody.size)};
      line-height: 1.8; margin-bottom: 0.4em;
    }
    .md-bg ul, .md-bg ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bgBody.size)};
      line-height: 1.8;
    }
    .md-bg li { margin-bottom: 0.3em; }
    .md-bg strong { font-weight: 700; }
    .md-bg em { font-style: italic; }
    .md-concl { overflow: hidden; color: #${D.COLORS.conclusionText}; }
    .md-concl h1, .md-concl h2, .md-concl h3 {
      font-size: ${ptToCqw(D.FONTS.conclTitle.size)};
      font-weight: 700; line-height: 1.3;
      margin-bottom: 0.35em; padding-bottom: 0.15em;
      border-bottom: ${pxToCqw(1)} solid #${D.COLORS.conclusionBorder};
    }
    .md-concl p {
      font-size: ${ptToCqw(D.FONTS.conclBody.size)};
      line-height: 1.7; margin-bottom: 0.3em;
    }
    .md-concl ul, .md-concl ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.conclBody.size)};
      line-height: 1.7;
    }
    .md-concl li { margin-bottom: 0.25em; }
    .md-concl strong { font-weight: 700; }
    .md-concl em { font-style: italic; }
    .flow-bullets {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bullet.size)};
      line-height: 1.8; overflow: hidden; margin: 0;
      color: #${D.COLORS.text};
    }
    .flow-bullets li { margin-bottom: 0.3em; }
    .slide-table {
      width: 100%; height: 100%;
      border-collapse: collapse; table-layout: fixed;
    }
    .slide-table .th {
      background: #${D.COLORS.tableHead};
      color: #${D.COLORS.tableHeadText};
      font-size: ${ptToCqw(D.FONTS.tableHead.size)};
      font-weight: 700;
      padding: 0.25em 0.6em;
      border: ${pxToCqw(1)} solid #${D.COLORS.tableBorder};
      text-align: left; vertical-align: middle; overflow: hidden;
    }
    .slide-table td {
      color: #${D.COLORS.tableText};
      font-size: ${ptToCqw(D.FONTS.tableBody.size)};
      font-weight: 400;
      padding: 0.25em 0.6em;
      border: ${pxToCqw(1)} solid #${D.COLORS.tableBorder};
      text-align: left; vertical-align: middle; overflow: hidden;
    }
    .slide-table tbody tr:nth-child(even) td:not(.th) { background: #${D.COLORS.tableRow}; }
    .slide-table tbody tr:nth-child(odd)  td:not(.th) { background: #${D.COLORS.tableRowAlt}; }
    .slide-matrix {
      width: 100%; height: 100%;
      display: grid;
      gap: ${pxToCqw(8)};
    }
    .slide-matrix-cell {
      border: ${pxToCqw(1)} solid #${D.COLORS.tableBorder};
      border-radius: ${pxToCqw(6)};
      padding: 0.45em 0.55em;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .slide-matrix-empty {
      background: transparent;
      border: none;
    }
    .slide-matrix-colhead {
      background: #${D.COLORS.tableHead};
      color: #${D.COLORS.tableHeadText};
      font-size: ${ptToCqw(D.FONTS.bodyHead.size)};
      font-weight: 700;
      line-height: 1.45;
      justify-content: center;
    }
    .slide-matrix-label {
      background: #${D.COLORS.bgBox};
      color: #${D.COLORS.text};
      font-size: ${ptToCqw(D.FONTS.bodyHead.size)};
      font-weight: 700;
      line-height: 1.45;
    }
    .slide-matrix-item {
      background: #${D.COLORS.surface};
      color: #${D.COLORS.text};
      font-size: ${ptToCqw(D.FONTS.tableBody.size)};
      font-weight: 400;
      line-height: 1.6;
    }
    .slide-fmatrix-label {
      position: relative;
      overflow: hidden;
    }
    .slide-h-fmatrix-head {
      position: relative;
      overflow: hidden;
    }
    .slide-compare-left {
      background: #${D.COLORS.bgBox};
      color: #${D.COLORS.text};
      font-size: ${ptToCqw(D.FONTS.tableBody.size)};
      font-weight: 400;
      line-height: 1.6;
    }
    .slide-compare-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: ${ptToCqw(D.FONTS.stepLabel.size)};
      font-weight: 700;
      color: #${D.COLORS.stepBorder};
    }
  `;
  document.head.appendChild(mdStyle);

  // ── ヘルパー関数 ─────────────────────────────────────
  function addBorderedBox(bx, by, bw, bh, bg, border, opts = {}) {
    slide.appendChild(el("div", {
      left: D.px(bx), top: D.py(by), width: D.px(bw), height: D.py(bh),
      background: "#" + bg,
      borderWidth: opts.borderW || pxToCqw(1), borderStyle: "solid", borderColor: "#" + border,
      ...(opts.radius   ? { borderRadius: opts.radius }  : {}),
      ...(opts.overflow ? { overflow:     opts.overflow } : {}),
    }));
  }

  function addMdBox(cls, bx, by, bw, bh, md) {
    const box = el("div", { left: D.px(bx), top: D.py(by), width: D.px(bw), height: D.py(bh), overflow: "hidden" });
    box.classList.add(cls);
    box.innerHTML = marked.parse(md || "");
    slide.appendChild(box);
  }

  function drawStepArrow(ax, ay, aw, ah, label) {
    const be = 0.015;
    const clip = "polygon(0 0, 88% 0, 100% 50%, 88% 100%, 0 100%)";
    slide.appendChild(el("div", {
      left: D.px(ax - be), top: D.py(ay - be), width: D.px(aw + be * 2), height: D.py(ah + be * 2),
      background: "#" + D.COLORS.stepBorder, clipPath: clip,
    }));
    slide.appendChild(el("div", {
      left: D.px(ax), top: D.py(ay), width: D.px(aw), height: D.py(ah),
      background: "#" + D.COLORS.stepFill, clipPath: clip,
    }));
    slide.appendChild(el("div", {
      left: D.px(ax), top: D.py(ay), width: D.px(aw * 0.85), height: D.py(ah),
      display: "flex", alignItems: "center", paddingLeft: D.px(0.15),
      fontSize: ptToCqw(D.FONTS.stepLabel.size), fontWeight: "700",
      color: "#" + D.COLORS.stepText, overflow: "hidden",
    }, label));
  }

  SLIDES.forEach(sd => {

    // ── カバーレイアウト ──────────────────────────────
    if (sd.layout === "cover") {
      const bgImg = document.createElement("img");
      bgImg.src = sd.bg || "";
      bgImg.setAttribute("data-role", "element");
      Object.assign(bgImg.style, {
        position: "absolute", left: "0", top: "0",
        width: D.px(D.slideW), height: D.px(D.slideH), objectFit: "cover",
      });
      slide.appendChild(bgImg);

      const cx = 0.5, cw = 5.5;
      const titleY = 1.36, titleH = 1.35;
      const divY = 2.81, divW = 4.0;
      const metaY = 3.01, metaSpacing = 0.35;

      const titleBox = el("div", {
        left: D.px(cx), top: D.py(titleY),
        width: D.px(cw), height: D.py(titleH),
        display: "flex", alignItems: "flex-end",
        fontSize: ptToCqw(D.FONTS.coverTitle.size), fontWeight: "700",
        color: "#" + D.COLORS.coverTitle,
        lineHeight: "1.4", whiteSpace: "pre-wrap", wordWrap: "break-word",
      });
      titleBox.innerHTML = marked.parseInline(sd.title || "");
      slide.appendChild(titleBox);

      slide.appendChild(el("div", {
        left: D.px(cx), top: D.py(divY),
        width: D.px(divW), height: pxToCqw(1),
        background: "#" + D.COLORS.coverDivider,
      }));

      ["affiliation", "presenter", "date"].forEach((key, i) => {
        const metaEl = el("div", {
          left: D.px(cx), top: D.py(metaY + i * metaSpacing),
          width: D.px(cw), height: D.py(0.35),
          display: "flex", alignItems: "center",
          fontSize: ptToCqw(D.FONTS.coverMeta.size),
          color: "#" + D.COLORS.coverMeta,
        });
        metaEl.innerHTML = marked.parseInline(sd[key] || "");
        slide.appendChild(metaEl);
      });
      return;
    }

    const H = { x: 0, y: 0, w: D.slideW, h: D.headerH, padX: D.headerPadX, padY: D.headerPadY };

    // ── ヘッダー帯 ──
    const headerEl = document.createElement("div");
    headerEl.setAttribute("data-role", "element");
    Object.assign(headerEl.style, {
      position: "absolute",
      left: D.px(H.x), top: D.py(H.y),
      width: D.px(H.w), height: D.py(H.h),
      background: "#" + D.COLORS.headerBg,
      display: "grid",
      gridTemplateRows: "2fr 1fr",
      gap: "0",
      boxSizing: "border-box",
      overflow: "hidden",
    });

    const titleEl = document.createElement("div");
    Object.assign(titleEl.style, {
      gridRow: "1",
      fontSize: ptToCqw(D.FONTS.title.size),
      fontWeight: "700",
      color: "#" + D.COLORS.headerText,
      overflow: "hidden",
      display: "flex",
      alignItems: "center",
      paddingLeft: D.px(H.padX),
      paddingRight: D.px(H.padX),
    });
    titleEl.innerHTML = marked.parseInline(sd.header.title || "");

    const msgEl = document.createElement("div");
    Object.assign(msgEl.style, {
      gridRow: "2",
      fontSize: ptToCqw(D.FONTS.message.size),
      fontWeight: "400",
      color: "#" + D.COLORS.headerText,
      opacity: "0.85",
      overflow: "hidden",
      display: "flex",
      alignItems: "center",
      paddingLeft: D.px(H.padX),
      paddingRight: D.px(H.padX),
    });
    msgEl.innerHTML = marked.parseInline(sd.header.message || "");

    headerEl.appendChild(titleEl);
    headerEl.appendChild(msgEl);
    slide.appendChild(headerEl);

    // ── グリッド計算 ──
    const grid = sd.grid || [];
    const numRows = grid.length;
    const numCols = Math.max(...grid.map(row =>
      row.reduce((sum, cell) => sum + (cell.span || 1), 0)
    ));

    const mainX = D.mainPadX;
    const mainW = D.slideW - D.mainPadX * 2;
    const contentY = D.headerH + D.mainPadY;
    const contentH = D.footerY - D.headerH - D.mainPadY * 2;
    const gap = D.gridGap;

    const ratios = sd.rowHeightRatios || Array(numRows).fill(1 / numRows);
    const rowHeights = ratios.map(r => contentH * r);

    const unitW = (mainW - gap * (numCols + 1)) / numCols;
    const cellX = (col) => mainX + gap + col * (unitW + gap);
    const cellW = (span) => unitW * span + gap * (span - 1);
    const rowTop = (row) => contentY + rowHeights.slice(0, row).reduce((a, b) => a + b, 0);
    const cellY = (row) => rowTop(row) + (row === 0 ? gap : gap / 2);
    const cellH = (row) => rowHeights[row] - (row === 0 ? gap : gap / 2) - (row === numRows - 1 ? gap : gap / 2);

    // ── グリッド背景（plain セルのみの場合はスキップ） ──
    const hasNonPlain = grid.some(row => row.some(cell => cell.type !== "plain"));
    if (hasNonPlain) {
      const areaBgKeys = ["area1Bg", "area2Bg", "area3Bg"];
      for (let col = 0; col < numCols; col++) {
        slide.appendChild(el("div", {
          left: D.px(mainX + col * (mainW / numCols)),
          top: D.py(contentY),
          width: D.px(mainW / numCols),
          height: D.py(contentH),
          background: "#" + D.COLORS[areaBgKeys[col] || "area1Bg"],
        }));
      }
    }

    // ── セルの描画 ──
    for (let row = 0; row < numRows; row++) {
      const cells = grid[row];
      let col = 0;
      for (const cell of cells) {
        const span = cell.span || 1;
        const cx = cellX(col), cy = cellY(row);
        const cw = cellW(span), ch = cellH(row);
        const padX = D.cardPadX, padY = D.cardPadY;

        if (cell.type === "section") {
          addBorderedBox(cx, cy, cw, ch, D.COLORS.bgBox, D.COLORS.border, { radius: "3px" });
          addMdBox("md-bg", cx + padX, cy + padY, cw - padX * 2, ch - padY * 2, cell.markdown || "");

        } else if (cell.type === "step_head") {
          drawStepArrow(cx, cy, cw, ch, cell.markdown || "");

        } else if (cell.type === "step") {
          const arrowH = ch * 0.28;
          const bulletY = cy + arrowH + gap * 2;
          const bulletH = ch - arrowH - gap * 2;
          drawStepArrow(cx, cy, cw, arrowH, cell.markdown || "");
          addBorderedBox(cx, bulletY, cw, bulletH, D.COLORS.surface, D.COLORS.border, { radius: "3px" });
          addMdBox("md-card", cx + padX, bulletY + padY, cw - padX * 2, bulletH - padY * 2, cell.markdown || "");

        } else if (cell.type === "arrow") {
          const arrowW = cw * 0.55, arrowX = cx + (cw - arrowW) / 2;
          const arrowH = ch * 0.75, arrowY = cy + (ch - arrowH) / 2;
          slide.appendChild(el("div", {
            left: D.px(arrowX), top: D.py(arrowY),
            width: D.px(arrowW), height: D.py(arrowH),
            background: "#" + D.COLORS.arrow,
            clipPath: "polygon(0% 0%, 100% 0%, 50% 100%)",
          }));

        } else if (cell.type === "table") {
          const wrap = el("div", { left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch), overflow: "hidden" });
          const table = document.createElement("table");
          table.className = "slide-table";
          const numTableCols = Math.max(
            cell.head ? cell.head.length : 0,
            ...(cell.rows || []).map(r => r.length)
          );
          const colgroup = document.createElement("colgroup");
          for (let j = 0; j < numTableCols; j++) {
            const c = document.createElement("col");
            c.style.width = (100 / numTableCols).toFixed(4) + "%";
            colgroup.appendChild(c);
          }
          table.appendChild(colgroup);
          const tbody = document.createElement("tbody");
          if (cell.head && cell.head.length > 0) {
            const tr = document.createElement("tr");
            tr.className = "head-row";
            cell.head.forEach(cellText => {
              const td = document.createElement("td");
              td.className = "th"; td.innerHTML = marked.parseInline(cellText || "");
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          }
          (cell.rows || []).forEach(rowData => {
            const tr = document.createElement("tr");
            rowData.forEach((cellText, j) => {
              const td = document.createElement("td");
              if (j === 0) td.className = "th";
              td.innerHTML = marked.parseInline(cellText || "");
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          wrap.appendChild(table);
          slide.appendChild(wrap);

        } else if (cell.type === "matrix") {
          const head = Array.isArray(cell.head) && cell.head.length > 0 ? [cell.head] : [];
          const rows = (cell.rows || []).filter(row => Array.isArray(row) && row.length > 0);
          const allRows = [...head, ...rows];
          const numMatrixRows = allRows.length;
          const numMatrixCols = Math.max(0, ...allRows.map(row => row.length));
          const wrap = el("div", { left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch), overflow: "hidden" });
          wrap.className = "slide-matrix";
          wrap.style.gridTemplateColumns = `repeat(${numMatrixCols}, minmax(0, 1fr))`;
          wrap.style.gridTemplateRows = `repeat(${numMatrixRows}, minmax(0, 1fr))`;
          allRows.forEach((rowData, i) => {
            const isHeadRow = head.length > 0 && i === 0;
            for (let j = 0; j < numMatrixCols; j++) {
              const cellBox = document.createElement("div");
              let cls = "slide-matrix-cell ";
              if (isHeadRow && j === 0) {
                cls = "slide-matrix-cell slide-matrix-empty";
              } else if (isHeadRow) {
                cls += "slide-matrix-colhead";
              } else if (j === 0) {
                cls += "slide-matrix-label";
              } else {
                cls += "slide-matrix-item";
              }
              cellBox.className = cls;
              cellBox.innerHTML = marked.parseInline(rowData[j] || "");
              wrap.appendChild(cellBox);
            }
          });
          slide.appendChild(wrap);

        } else if (cell.type === "flow_matrix") {
          const fmHead = Array.isArray(cell.head) && cell.head.length > 0 ? [cell.head] : [];
          const fmDataRows = (cell.rows || []).filter(r => Array.isArray(r) && r.length > 0);
          const allFmRows = [...fmHead, ...fmDataRows];
          const numFmAllRows = allFmRows.length;
          const numFmCols = Math.max(0, ...allFmRows.map(row => row.length));
          if (numFmAllRows > 0 && numFmCols > 0) {
            const wrap = el("div", { left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch), overflow: "hidden" });
            wrap.className = "slide-matrix";
            wrap.style.gridTemplateColumns = `repeat(${numFmCols}, minmax(0, 1fr))`;
            wrap.style.gridTemplateRows = `repeat(${numFmAllRows}, minmax(0, 1fr))`;
            const hasHead = fmHead.length > 0;
            allFmRows.forEach((rowData, i) => {
              const isHeadRow = hasHead && i === 0;
              const clip = "polygon(0% 0%, 100% 0%, 100% 75%, 50% 100%, 0% 75%)";
              for (let j = 0; j < numFmCols; j++) {
                if (isHeadRow && j === 0) {
                  const cellBox = document.createElement("div");
                  cellBox.className = "slide-matrix-cell slide-matrix-empty";
                  wrap.appendChild(cellBox);
                } else if (isHeadRow) {
                  const cellBox = document.createElement("div");
                  cellBox.className = "slide-matrix-cell slide-matrix-colhead";
                  cellBox.innerHTML = marked.parseInline(rowData[j] || "");
                  wrap.appendChild(cellBox);
                } else if (j === 0) {
                  const gridCell = document.createElement("div");
                  gridCell.className = "slide-fmatrix-label";
                  const borderDiv = document.createElement("div");
                  Object.assign(borderDiv.style, { position: "absolute", inset: "0", background: "#" + D.COLORS.stepBorder, clipPath: clip });
                  const fillDiv = document.createElement("div");
                  Object.assign(fillDiv.style, { position: "absolute", inset: pxToCqw(2), background: "#" + D.COLORS.stepFill, clipPath: clip });
                  const textDiv = document.createElement("div");
                  Object.assign(textDiv.style, {
                    position: "absolute", top: "0", left: "0", right: "0", height: "75%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: ptToCqw(D.FONTS.stepLabel.size), fontWeight: "700",
                    color: "#" + D.COLORS.stepText,
                    overflow: "hidden", textAlign: "center",
                    padding: `0 ${pxToCqw(4)}`, boxSizing: "border-box",
                  });
                  textDiv.textContent = rowData[j] || "";
                  gridCell.appendChild(borderDiv);
                  gridCell.appendChild(fillDiv);
                  gridCell.appendChild(textDiv);
                  wrap.appendChild(gridCell);
                } else {
                  const cellBox = document.createElement("div");
                  cellBox.className = "slide-matrix-cell slide-matrix-item";
                  cellBox.innerHTML = marked.parseInline(rowData[j] || "");
                  wrap.appendChild(cellBox);
                }
              }
            });
            slide.appendChild(wrap);
          }

        } else if (cell.type === "h_flow_matrix") {
          const hmHead = Array.isArray(cell.head) && cell.head.length > 0 ? [cell.head] : [];
          const hmDataRows = (cell.rows || []).filter(r => Array.isArray(r) && r.length > 0);
          const allHmRows = [...hmHead, ...hmDataRows];
          const numHmAllRows = allHmRows.length;
          const numHmCols = Math.max(0, ...allHmRows.map(row => row.length));
          if (numHmAllRows > 0 && numHmCols > 0) {
            const wrap = el("div", { left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch), overflow: "hidden" });
            wrap.className = "slide-matrix";
            wrap.style.gridTemplateColumns = `repeat(${numHmCols}, minmax(0, 1fr))`;
            wrap.style.gridTemplateRows = `repeat(${numHmAllRows}, minmax(0, 1fr))`;
            const hasHmHead = hmHead.length > 0;
            const rClip = "polygon(0% 0%, 75% 0%, 100% 50%, 75% 100%, 0% 100%)";
            allHmRows.forEach((rowData, i) => {
              const isHeadRow = hasHmHead && i === 0;
              for (let j = 0; j < numHmCols; j++) {
                if (isHeadRow && j === 0) {
                  const cellBox = document.createElement("div");
                  cellBox.className = "slide-matrix-cell slide-matrix-empty";
                  wrap.appendChild(cellBox);
                } else if (isHeadRow) {
                  const gridCell = document.createElement("div");
                  gridCell.className = "slide-h-fmatrix-head";
                  const borderDiv = document.createElement("div");
                  Object.assign(borderDiv.style, { position: "absolute", inset: "0", background: "#" + D.COLORS.stepBorder, clipPath: rClip });
                  const fillDiv = document.createElement("div");
                  Object.assign(fillDiv.style, { position: "absolute", inset: pxToCqw(2), background: "#" + D.COLORS.stepFill, clipPath: rClip });
                  const textDiv = document.createElement("div");
                  Object.assign(textDiv.style, {
                    position: "absolute", top: "0", left: "0", width: "75%", height: "100%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: ptToCqw(D.FONTS.stepLabel.size), fontWeight: "700",
                    color: "#" + D.COLORS.stepText,
                    overflow: "hidden", textAlign: "center",
                    padding: `0 ${pxToCqw(4)}`, boxSizing: "border-box",
                  });
                  textDiv.textContent = rowData[j] || "";
                  gridCell.appendChild(borderDiv);
                  gridCell.appendChild(fillDiv);
                  gridCell.appendChild(textDiv);
                  wrap.appendChild(gridCell);
                } else if (j === 0) {
                  const cellBox = document.createElement("div");
                  cellBox.className = "slide-matrix-cell slide-matrix-label";
                  cellBox.innerHTML = marked.parseInline(rowData[j] || "");
                  wrap.appendChild(cellBox);
                } else {
                  const cellBox = document.createElement("div");
                  cellBox.className = "slide-matrix-cell slide-matrix-item";
                  cellBox.innerHTML = marked.parseInline(rowData[j] || "");
                  wrap.appendChild(cellBox);
                }
              }
            });
            slide.appendChild(wrap);
          }

        } else if (cell.type === "compare") {
          const cmpHead = Array.isArray(cell.head) && cell.head.length > 0 ? cell.head : [];
          const cmpRows = (cell.rows || []).filter(r => Array.isArray(r) && r.length > 0);
          const numDataRows = cmpRows.length;
          if (numDataRows > 0) {
            const hasHead = cmpHead.length > 0;
            const gap = D.gridGap;
            const numGridRows = numDataRows + (hasHead ? 1 : 0);
            const cellH = (ch - gap * (numGridRows - 1)) / numGridRows;
            // 列幅: ラベル1 : 左1 : 矢印0.08 : 右1 (total=3.08)
            const totalFr = 3.08;
            const availW = cw - gap * 3;
            const cellW  = availW / totalFr;
            const arrowW = availW * 0.08 / totalFr;
            const labelX = cx;
            const leftX  = cx + cellW + gap;
            const arrowX = leftX + cellW + gap;
            const rightX = arrowX + arrowW + gap;
            // ヘッダー行
            if (hasHead) {
              const hy = cy;
              const lhBox = el("div", { left: D.px(leftX), top: D.py(hy), width: D.px(cellW), height: D.py(cellH) });
              lhBox.className = "slide-matrix-cell slide-matrix-colhead";
              lhBox.innerHTML = marked.parseInline(cmpHead[1] || "");
              slide.appendChild(lhBox);
              const rhBox = el("div", { left: D.px(rightX), top: D.py(hy), width: D.px(cellW), height: D.py(cellH) });
              rhBox.className = "slide-matrix-cell slide-matrix-colhead";
              rhBox.innerHTML = marked.parseInline(cmpHead[2] || "");
              slide.appendChild(rhBox);
            }
            // データ行
            const dataTop = hasHead ? cy + cellH + gap : cy;
            cmpRows.forEach((row, i) => {
              const rowY = dataTop + i * (cellH + gap);
              const lbl = row[0] || "", lv = row[1] || "", rv = row[2] || "";
              const lblBox = el("div", { left: D.px(labelX), top: D.py(rowY), width: D.px(cellW), height: D.py(cellH) });
              lblBox.className = "slide-matrix-cell slide-matrix-label";
              lblBox.innerHTML = marked.parseInline(lbl);
              slide.appendChild(lblBox);
              const lBox = el("div", { left: D.px(leftX), top: D.py(rowY), width: D.px(cellW), height: D.py(cellH) });
              lBox.className = "slide-matrix-cell slide-matrix-item";
              lBox.innerHTML = marked.parseInline(lv);
              slide.appendChild(lBox);
              const rBox = el("div", { left: D.px(rightX), top: D.py(rowY), width: D.px(cellW), height: D.py(cellH) });
              rBox.className = "slide-matrix-cell slide-matrix-item";
              rBox.innerHTML = marked.parseInline(rv);
              slide.appendChild(rBox);
            });
            // 縦長両矢印（データ行全体にスパン、背景なし・clip-path形状）
            const dataH = numDataRows * cellH + (numDataRows - 1) * gap;
            const arrowEl = el("div", {
              left: D.px(arrowX), top: D.py(dataTop), width: D.px(arrowW), height: D.py(dataH),
              background: "#" + D.COLORS.stepBorder,
              clipPath: "polygon(0% 50%, 35% 20%, 35% 40%, 65% 40%, 65% 20%, 100% 50%, 65% 80%, 65% 60%, 35% 60%, 35% 80%)",
            });
            slide.appendChild(arrowEl);
          }

        } else if (cell.type === "conclusion") {
          const accentW = D.conclusionAccentW;
          addBorderedBox(cx, cy, cw, ch, D.COLORS.conclusionBg, D.COLORS.conclusionBorder, { borderW: pxToCqw(1.5), radius: "4px" });
          slide.appendChild(el("div", {
            left: D.px(cx), top: D.py(cy),
            width: D.px(accentW), height: D.py(ch),
            background: "#" + D.COLORS.conclusionBorder,
            borderRadius: "4px 0 0 4px",
          }));
          addMdBox("md-concl", cx + accentW + padX, cy + padY, cw - accentW - padX * 2, ch - padY * 2, cell.markdown || "");

        } else if (cell.type === "plain") {
          const pPadX = D.headerPadX, pPadY = D.mainPadY;
          addMdBox("md-plain", cx + pPadX, cy + pPadY, cw - pPadX * 2, ch - pPadY * 2, cell.markdown || "");
          // 隣接セル間の縦仕切り線（隣が image の場合はボーダーが既にあるので描かない）
          const nextCell = cells[cells.indexOf(cell) + 1];
          if (col + span < numCols && !(nextCell && nextCell.type === "image")) {
            slide.appendChild(el("div", {
              left: D.px(cx + cw + gap / 2), top: D.py(cy),
              width: pxToCqw(1), height: D.py(ch),
              background: "#" + D.COLORS.border,
            }));
          }

        } else if (cell.type === "image") {
          addBorderedBox(cx, cy, cw, ch, D.COLORS.surface, D.COLORS.border, { overflow: "hidden" });
          if (cell.src) {
            const img = document.createElement("img");
            img.src = cell.src;
            img.setAttribute("data-role", "element");
            Object.assign(img.style, {
              position: "absolute",
              left: D.px(cx), top: D.py(cy),
              width: D.px(cw), height: D.py(ch),
              objectFit: "cover",
            });
            slide.appendChild(img);
          } else {
            slide.appendChild(el("div", {
              left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch),
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: ptToCqw(D.FONTS.bodyText.size),
              color: "#" + D.COLORS.textMuted,
            }, cell.markdown || "画像 / Image"));
          }

        } else if (cell.type === "card") {
          addBorderedBox(cx, cy, cw, ch, D.COLORS.surface, D.COLORS.border);
          const _cardMd = cell.markdown || "";
          const _titleM = _cardMd.match(/^#{1,3}\s+(.+)$/m);
          const title = _titleM ? _titleM[1].trim() : "";
          const bodyMd = _titleM ? _cardMd.slice(_cardMd.indexOf(_titleM[0]) + _titleM[0].length).trim() : _cardMd;
          if (title) {
            slide.appendChild(el("div", {
              left: D.px(cx + padX), top: D.py(cy + padY),
              width: D.px(cw - padX * 2), height: D.py(0.35),
              fontSize: ptToCqw(D.FONTS.cardTitle.size), fontWeight: "700",
              color: "#" + D.COLORS.text,
              display: "flex", alignItems: "center", overflow: "hidden",
            }, title));
            slide.appendChild(el("div", {
              left: D.px(cx + padX), top: D.py(cy + D.cardDivY),
              width: D.px(cw - padX * 2), height: D.py(0.007),
              background: "#" + D.COLORS.border,
            }));
          }
          if (bodyMd) {
            const bodyY = cy + (title ? D.cardDivY + 0.08 : padY);
            const bodyH = cy + ch - bodyY - padY;
            addMdBox("md-card", cx + padX, bodyY, cw - padX * 2, bodyH, bodyMd);
          }
        }
        col += span;
      }
    }

    // ── フッター ──
    slide.appendChild(el("div", {
      left: D.px(0), top: D.py(D.footerY),
      width: D.px(D.slideW), height: D.py(0.0071),
      background: "#" + D.COLORS.border,
    }));
    const footerRow = el("div", {
      left: D.px(D.footerPadX), top: D.py(D.footerY),
      width: D.px(D.slideW - D.footerPadX * 2), height: D.py(D.footerH),
      display: "flex", alignItems: "center", justifyContent: "space-between",
    });
    const pageSpan = document.createElement("span");
    pageSpan.textContent = sd.page;
    pageSpan.style.fontSize = ptToCqw(D.FONTS.footer.size);
    pageSpan.style.color = "#" + D.COLORS.textMuted;
    footerRow.appendChild(pageSpan);
    const logo = document.createElement("img");
    logo.src = sd.logo; logo.alt = "Logo";
    logo.style.height = D.px(D.logoH);
    logo.style.width = "auto"; logo.style.objectFit = "contain";
    footerRow.appendChild(logo);
    slide.appendChild(footerRow);
  });
})();

function el(tag, styles, text) {
  const e = document.createElement(tag);
  e.setAttribute("data-role", "element");
  Object.assign(e.style, { position: "absolute", ...styles });
  if (text) e.textContent = text;
  return e;
}
</script>
</body>
</html>
