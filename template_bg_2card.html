<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Slide (BG + 2 Cards)</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #e8e8e8; }
  .slide-wrapper {
    width: 100%; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  .slide {
    aspect-ratio: 16 / 9;
    width: min(100vh * 16 / 9, 100vw);
    max-height: 100vh;
    position: relative;
    background: #fff;
    overflow: hidden;
    container-type: inline-size;
  }
  .slide [data-role] { position: absolute; }
</style>
</head>
<body>
<div class="slide-wrapper">
  <div class="slide" id="slide"></div>
</div>

<script>
// =====================================================
// ここを編集してスライドをカスタマイズしてください
// =====================================================

// ── テキスト内容 ──────────────────────────────────
// header.title       ヘッダーの大きいタイトル
// header.message     ヘッダーの小さいサブタイトル
// bg.markdown        上部背景ボックスの内容（Markdown）
// cards[].markdown   カードの内容（Markdown）
//   ##  で始まる行 → カードタイトル（下に区切り線が入る）
//   -   で始まる行 → 箇条書き
//   それ以外        → 通常テキスト（段落）
// page               フッター左端のページ番号表示
// logo               フッター右端に表示する画像ファイル名
const SLIDES = [
  {
    "header": {
      "title": "2024年度 事業成果レポート",
      "message": "主要KPIの達成状況と来期に向けた施策概要"
    },
    "bg": {
      "markdown": `## 背景・概要

今期は新規市場への参入と既存顧客への深耕を両輪として事業を推進した。外部環境の変化に柔軟に対応しながら、売上・収益ともに計画を上回る着地となった。来期はさらなる成長加速に向けた投資を集中的に実施する方針である。`
    },
    "cards": [
      {
        "markdown": `## 売上実績

- 売上高 1,234,567円（前年比 +12.3%）
- 顧客数 456社（新規獲得 87社）
- ROI: 78.9% / CAGR 5.6%`
      },
      {
        "markdown": `## KPI Overview

- Q1達成率 101.2%（Target: ¥97M）
- Net Promoter Score: 62pt
- コスト削減 ¥3,200,000`
      }
    ],
    "page": "1 / 1",
    "logo": "logo.png"
  }
]; // END_SLIDES

// ── デザイン（色・フォント） ─────────────────────
// 色は 16進数6桁（# なし）で指定
// フォントサイズはポイント数（数値）で指定
const DESIGN = {
  "COLORS": {
    "headerBg":   "4A4A4A",  // ヘッダー帯の背景色
    "headerText": "FFFFFF",  // ヘッダーの文字色
    "bgBox":      "E8EDF2",  // 背景ボックスの背景色
    "surface":    "F5F5F5",  // カードの背景色
    "border":     "E0E0E0",  // 枠線・区切り線の色
    "text":       "333333",  // 本文テキストの色
    "textMuted":  "888888",  // フッター（ページ番号）の色
    "bg":         "FFFFFF"   // スライド全体の背景色
  },
  "FONTS": {
    "family":    "Segoe UI",                        // 欧文フォント名（和文は常に Meiryo）
    "title":     { "size": 24, "bold": true  },     // ヘッダータイトル
    "message":   { "size": 12, "bold": false },     // ヘッダーサブタイトル
    "bgTitle":   { "size": 13, "bold": true  },     // 背景ボックスタイトル
    "bgBody":    { "size": 11, "bold": false },     // 背景ボックス本文
    "cardTitle": { "size": 13, "bold": true  },     // カードタイトル
    "cardBody":  { "size": 11, "bold": false },     // カード本文・箇条書き
    "footer":    { "size": 10, "bold": false }      // フッターのページ番号
  }
}; // END_DESIGN

// =====================================================
// 以下はテンプレート（通常は編集不要）
// =====================================================

const W = 10, H = 5.625;
const px = (inch) => (inch / W * 100) + "%";
const py = (inch) => (inch / H * 100) + "%";

const D = {
  "SLIDE_W": 10.0,
  "SLIDE_H": 5.625,
  "HEADER":  { "x": 0, "y": 0, "w": 10.0, "h": 0.85, "padX": 0.25, "padY": 0.08 },
  "BG_BOX":  { "x": 0.25, "y": 0.95, "w": 9.5, "h": 1.3, "padX": 0.2, "padY": 0.15 },
  "CARDS": [
    { "x": 0.25,  "y": 2.35, "w": 4.675, "h": 2.775 },
    { "x": 5.075, "y": 2.35, "w": 4.675, "h": 2.775 }
  ],
  "CARD_PAD": { "x": 0.2, "y": 0.15 },
  "CARD_DIVIDER_OFFSET_Y": 0.45,
  "FOOTER":  { "x": 0, "y": 5.225, "w": 10.0, "h": 0.4, "padX": 0.25 },
  "LOGO_H":  0.25
};

D.COLORS = DESIGN.COLORS;
D.FONTS  = DESIGN.FONTS;

(D => {
  const slide = document.getElementById("slide");
  slide.style.fontFamily = `"${D.FONTS.family}", "Meiryo", sans-serif`;
  slide.style.color = "#" + D.COLORS.text;

  const ptToCqw = (pt) => (pt / 720 * 100) + "cqw";
  const pxToCqw = (px) => (px / 960 * 100) + "cqw";

  const mdStyle = document.createElement("style");
  mdStyle.textContent = `
    .md-bg h1, .md-bg h2, .md-bg h3 {
      font-size: ${ptToCqw(D.FONTS.bgTitle.size)};
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.4em;
      padding-bottom: 0.2em;
      border-bottom: 1.5px solid #${D.COLORS.border};
    }
    .md-bg p {
      font-size: ${ptToCqw(D.FONTS.bgBody.size)};
      line-height: 1.8;
      margin-bottom: 0.4em;
    }
    .md-bg ul, .md-bg ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bgBody.size)};
      line-height: 1.8;
    }
    .md-bg li { margin-bottom: 0.3em; }
    .md-card { overflow: hidden; }
    .md-card h1, .md-card h2, .md-card h3 {
      font-size: ${ptToCqw(D.FONTS.cardTitle.size)};
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.4em;
      padding-bottom: 0.2em;
      border-bottom: 1.5px solid #${D.COLORS.border};
    }
    .md-card p {
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      line-height: 1.8;
      margin-bottom: 0.4em;
    }
    .md-card ul, .md-card ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      line-height: 1.8;
    }
    .md-card li { margin-bottom: 0.3em; }
    .md-card strong, .md-bg strong { font-weight: 700; }
    .md-card em, .md-bg em { font-style: italic; }
    .md-card code, .md-bg code {
      font-size: 0.9em;
      background: #${D.COLORS.border};
      padding: 0.1em 0.3em;
      border-radius: 2px;
    }
  `;
  document.head.appendChild(mdStyle);

  SLIDES.forEach(sd => {
    const L = D.HEADER;

    // ── ヘッダー帯 ──
    slide.appendChild(el("div", {
      left: px(L.x), top: py(L.y), width: px(L.w), height: py(L.h),
      background: "#" + D.COLORS.headerBg,
    }));
    slide.appendChild(el("div", {
      left: px(L.padX), top: py(L.padY),
      width: px(L.w - L.padX * 2), height: py(0.45),
      fontSize: ptToCqw(D.FONTS.title.size),
      fontWeight: D.FONTS.title.bold ? "700" : "400",
      color: "#" + D.COLORS.headerText,
      display: "flex", alignItems: "center",
    }, sd.header.title));
    slide.appendChild(el("div", {
      left: px(L.padX), top: py(L.padY + 0.45),
      width: px(L.w - L.padX * 2), height: py(0.3),
      fontSize: ptToCqw(D.FONTS.message.size),
      fontWeight: D.FONTS.message.bold ? "700" : "400",
      color: "#" + D.COLORS.headerText, opacity: "0.85",
      display: "flex", alignItems: "center",
    }, sd.header.message));

    // ── 背景ボックス ──
    const B = D.BG_BOX;
    slide.appendChild(el("div", {
      left: px(B.x), top: py(B.y), width: px(B.w), height: py(B.h),
      background: "#" + D.COLORS.bgBox,
      border: "1px solid #" + D.COLORS.border,
      borderRadius: "3px",
    }));
    const bgContent = el("div", {
      left: px(B.x + B.padX), top: py(B.y + B.padY),
      width: px(B.w - B.padX * 2),
      height: py(B.h - B.padY * 2),
      overflow: "hidden",
    });
    bgContent.classList.add("md-bg");
    bgContent.innerHTML = marked.parse(sd.bg.markdown);
    slide.appendChild(bgContent);

    // ── カード ──
    sd.cards.forEach((cardData, i) => {
      const c = D.CARDS[i];
      const cp = D.CARD_PAD;
      slide.appendChild(el("div", {
        left: px(c.x), top: py(c.y), width: px(c.w), height: py(c.h),
        background: "#" + D.COLORS.surface,
        border: "1px solid #" + D.COLORS.border,
        borderRadius: "3px",
      }));
      const contentBox = el("div", {
        left: px(c.x + cp.x), top: py(c.y + cp.y),
        width: px(c.w - cp.x * 2),
        height: py(c.h - cp.y * 2),
        overflow: "hidden",
      });
      contentBox.classList.add("md-card");
      contentBox.innerHTML = marked.parse(cardData.markdown);
      slide.appendChild(contentBox);
    });

    // ── フッター ──
    const F = D.FOOTER;
    slide.appendChild(el("div", {
      left: px(0), top: py(F.y),
      width: px(F.w), height: "1px",
      background: "#" + D.COLORS.border,
    }));
    const footerRow = el("div", {
      left: px(F.padX), top: py(F.y),
      width: px(F.w - F.padX * 2), height: py(F.h),
      display: "flex", alignItems: "center", justifyContent: "space-between",
    });
    const pageSpan = document.createElement("span");
    pageSpan.textContent = sd.page;
    pageSpan.style.fontSize = ptToCqw(D.FONTS.footer.size);
    pageSpan.style.color = "#" + D.COLORS.textMuted;
    footerRow.appendChild(pageSpan);
    const logo = document.createElement("img");
    logo.src = sd.logo;
    logo.alt = "Logo";
    logo.style.height = (D.LOGO_H / D.SLIDE_W * 100) + "cqw";
    logo.style.width = "auto";
    logo.style.objectFit = "contain";
    footerRow.appendChild(logo);
    slide.appendChild(footerRow);
  });
})(D);

function el(tag, styles, text) {
  const e = document.createElement(tag);
  e.setAttribute("data-role", "element");
  Object.assign(e.style, { position: "absolute", ...styles });
  if (text) e.textContent = text;
  return e;
}
</script>
</body>
</html>
