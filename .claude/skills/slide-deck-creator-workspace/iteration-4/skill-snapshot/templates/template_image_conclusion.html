<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Slide</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #e8e8e8; }
  .slide-wrapper {
    width: 100%; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  .slide {
    aspect-ratio: 16 / 9;
    width: min(100vh * 16 / 9, 100vw);
    max-height: 100vh;
    position: relative;
    background: #fff;
    overflow: hidden;
    container-type: inline-size;
  }
  .slide [data-role] { position: absolute; }
</style>
</head>
<body>
<div class="slide-wrapper">
  <div class="slide" id="slide"></div>
</div>

<script>
const SLIDES = [
  {
    "header": {
      "title": "スライドタイトル A-01 / Slide Title Placeholder",
      "message": "サブタイトルテキスト B-02 / Subtitle Text Placeholder"
    },
    "rowHeightRatios": [0.77, 0.23],
    "grid": [
      [
        {
          "type": "image",
          "label": "画像 / Image"
        }
      ],
      [
        {
          "type": "conclusion",
          "markdown": "**結論テキスト bold**。*補足 italic*、~~旧情報~~ → 更新済み。`参照 XYZ-001`。  \n> 根拠・引用を引用スタイルで記載。"
        }
      ]
    ],
    "page": "1 / 1",
    "logo": "logo.png"
  }
]; // END_SLIDES
const DESIGN = {
  "COLORS": {
    "headerBg": "4A4A4A",
    "headerText": "FFFFFF",
    "surface": "F5F5F5",
    "text": "333333",
    "textMuted": "888888",
    "border": "E0E0E0",
    "bg": "FFFFFF",
    "area1Bg": "FFFFFF",
    "area2Bg": "FFFFFF",
    "area3Bg": "FFFFFF",
    "bgBox": "E8EDF2",
    "arrow": "6B7A99",
    "stepFill": "D0D0D0",
    "stepBorder": "CCCCCC",
    "stepText": "333333",
    "tableHead": "6B7A99",
    "tableHeadText": "FFFFFF",
    "tableRow": "FFFFFF",
    "tableRowAlt": "F5F5F5",
    "tableText": "333333",
    "tableBorder": "D0D0D0",
    "conclusionBg": "EEF2FF",
    "conclusionBorder": "6B7A99",
    "conclusionText": "1A2A5A",
    "coverTitle": "000000",
    "coverDivider": "000000",
    "coverMeta": "333333"
  },
  "FONTS": {
    "family": "Segoe UI",
    "title": { "size": 24, "bold": true },
    "message": { "size": 12, "bold": false },
    "bgTitle": { "size": 13, "bold": true },
    "bgBody": { "size": 12, "bold": false },
    "bodyHead": { "size": 12, "bold": true },
    "bodyText": { "size": 12, "bold": false },
    "cardTitle": { "size": 14, "bold": true },
    "cardBody": { "size": 11, "bold": false },
    "tableHead": { "size": 12, "bold": true },
    "tableBody": { "size": 12, "bold": false },
    "stepLabel": { "size": 14, "bold": true },
    "bullet": { "size": 12, "bold": false },
    "conclTitle": { "size": 13, "bold": true },
    "conclBody": { "size": 12, "bold": false },
    "coverTitle": { "size": 28, "bold": true },
    "coverMeta": { "size": 16, "bold": false },
    "footer": { "size": 10, "bold": false }
  },
  "LAYOUT": {
    "slideW": 10.0,
    "slideH": 5.625,
    "headerH": 0.85,
    "headerPadX": 0.25,
    "headerPadY": 0.08,
    "footerY": 5.225,
    "footerH": 0.4,
    "footerPadX": 0.25,
    "mainPadX": 0.1,
    "mainPadY": 0.1,
    "gridGap": 0.08,
    "cardPadX": 0.15,
    "cardPadY": 0.12,
    "cardDivY": 0.4,
    "logoH": 0.25,
    "conclusionAccentW": 0.07
  }
}; // END_DESIGN

const D = (() => {
  const L = DESIGN.LAYOUT;
  const px = (inch) => (inch / L.slideW * 100) + "%";
  const py = (inch) => (inch / L.slideH * 100) + "%";
  return { ...L, "COLORS": DESIGN.COLORS, "FONTS": DESIGN.FONTS, px, py };
})();

(() => {
  const slide = document.getElementById("slide");
  slide.style.fontFamily = `"${D.FONTS.family}", "Meiryo", sans-serif`;
  slide.style.color = "#" + D.COLORS.text;

  const ptToCqw = (pt) => (pt / 720 * 100) + "cqw";
  const pxToCqw = (px) => (px / 960 * 100) + "cqw";

  const mdStyle = document.createElement("style");
  mdStyle.textContent = `
    .md-card { overflow: hidden; }
    .md-card h1, .md-card h2, .md-card h3 {
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      font-weight: 700; line-height: 1.3; margin: 0 0 0.3em 0;
    }
    .md-card p {
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      line-height: 1.6; margin: 0 0 0.3em 0;
    }
    .md-card ul, .md-card ol {
      padding-left: 1.2em;
      font-size: ${ptToCqw(D.FONTS.cardBody.size)};
      line-height: 1.6; margin: 0;
    }
    .md-card li { margin-bottom: 0.2em; }
    .md-plain { overflow: hidden; }
    .md-plain h1, .md-plain h2, .md-plain h3 {
      font-size: ${ptToCqw(D.FONTS.bodyHead.size)};
      font-weight: 700; line-height: 1.4;
      margin-top: 0.6em; margin-bottom: 0.3em;
    }
    .md-plain h1:first-child, .md-plain h2:first-child, .md-plain h3:first-child { margin-top: 0; }
    .md-plain p {
      font-size: ${ptToCqw(D.FONTS.bodyText.size)};
      line-height: 1.8; margin-bottom: 0.5em;
    }
    .md-plain ul, .md-plain ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bodyText.size)};
      line-height: 1.8;
    }
    .md-plain li { margin-bottom: 0.3em; }
    .md-plain strong { font-weight: 700; }
    .md-plain em { font-style: italic; }
    .md-bg { overflow: hidden; }
    .md-bg h1, .md-bg h2, .md-bg h3 {
      font-size: ${ptToCqw(D.FONTS.bgTitle.size)};
      font-weight: 700; line-height: 1.3;
      margin-bottom: 0.4em; padding-bottom: 0.2em;
      border-bottom: 1px solid #${D.COLORS.border};
    }
    .md-bg p {
      font-size: ${ptToCqw(D.FONTS.bgBody.size)};
      line-height: 1.8; margin-bottom: 0.4em;
    }
    .md-bg ul, .md-bg ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bgBody.size)};
      line-height: 1.8;
    }
    .md-bg li { margin-bottom: 0.3em; }
    .md-bg strong { font-weight: 700; }
    .md-bg em { font-style: italic; }
    .md-concl { overflow: hidden; color: #${D.COLORS.conclusionText}; }
    .md-concl h1, .md-concl h2, .md-concl h3 {
      font-size: ${ptToCqw(D.FONTS.conclTitle.size)};
      font-weight: 700; line-height: 1.3;
      margin-bottom: 0.35em; padding-bottom: 0.15em;
      border-bottom: 1px solid #${D.COLORS.conclusionBorder};
    }
    .md-concl p {
      font-size: ${ptToCqw(D.FONTS.conclBody.size)};
      line-height: 1.7; margin-bottom: 0.3em;
    }
    .md-concl ul, .md-concl ol {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.conclBody.size)};
      line-height: 1.7;
    }
    .md-concl li { margin-bottom: 0.25em; }
    .md-concl strong { font-weight: 700; }
    .md-concl em { font-style: italic; }
    .flow-bullets {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bullet.size)};
      line-height: 1.8; overflow: hidden; margin: 0;
      color: #${D.COLORS.text};
    }
    .flow-bullets li { margin-bottom: 0.3em; }
    .slide-table {
      width: 100%; height: 100%;
      border-collapse: collapse; table-layout: fixed;
    }
    .slide-table .th {
      background: #${D.COLORS.tableHead};
      color: #${D.COLORS.tableHeadText};
      font-size: ${ptToCqw(D.FONTS.tableHead.size)};
      font-weight: 700;
      padding: 0.25em 0.6em;
      border: ${pxToCqw(1)} solid #${D.COLORS.tableBorder};
      text-align: left; vertical-align: middle; overflow: hidden;
    }
    .slide-table td {
      color: #${D.COLORS.tableText};
      font-size: ${ptToCqw(D.FONTS.tableBody.size)};
      font-weight: 400;
      padding: 0.25em 0.6em;
      border: ${pxToCqw(1)} solid #${D.COLORS.tableBorder};
      text-align: left; vertical-align: middle; overflow: hidden;
    }
    .slide-table tbody tr:nth-child(even) td:not(.th) { background: #${D.COLORS.tableRow}; }
    .slide-table tbody tr:nth-child(odd)  td:not(.th) { background: #${D.COLORS.tableRowAlt}; }
    .md-plain code, .md-bg code, .md-card code {
      background: #${D.COLORS.surface}; padding: 0.1em 0.3em;
      border-radius: 2px; font-size: inherit;
    }
    .md-concl code {
      background: rgba(255,255,255,0.45); padding: 0.1em 0.3em;
      border-radius: 2px; font-size: inherit;
    }
    .md-plain blockquote, .md-bg blockquote, .md-card blockquote {
      border-left: 3px solid #${D.COLORS.border};
      padding-left: 0.7em; margin: 0.3em 0 0.4em;
      color: #${D.COLORS.textMuted}; font-style: italic;
    }
    .md-concl blockquote {
      border-left: 3px solid #${D.COLORS.conclusionBorder};
      padding-left: 0.7em; margin: 0.3em 0 0.4em;
      opacity: 0.75; font-style: italic;
    }
  `;
  document.head.appendChild(mdStyle);

  function parseCardMarkdown(md) {
    const lines = md.trim().split("\n");
    let title = "", items = [];
    for (const line of lines) {
      const s = line.trim();
      if (!s) continue;
      const m = s.match(/^#{1,3}\s+(.*)/);
      if (m) { title = m[1]; }
      else if (s.match(/^[-*+]\s+/)) { items.push({ type: "bullet", text: s.replace(/^[-*+]\s+/, "") }); }
      else { items.push({ type: "para", text: s }); }
    }
    return { title, items };
  }

  SLIDES.forEach(sd => {

    const H = { x: 0, y: 0, w: D.slideW, h: D.headerH, padX: D.headerPadX, padY: D.headerPadY };

    // ── ヘッダー帯 ──
    slide.appendChild(el("div", {
      left: D.px(H.x), top: D.py(H.y), width: D.px(H.w), height: D.py(H.h),
      background: "#" + D.COLORS.headerBg,
    }));
    slide.appendChild(el("div", {
      left: D.px(H.padX), top: D.py(H.padY),
      width: D.px(H.w - H.padX * 2), height: D.py(0.45),
      fontSize: ptToCqw(D.FONTS.title.size), fontWeight: "700",
      color: "#" + D.COLORS.headerText, display: "flex", alignItems: "center",
    }, sd.header.title));
    slide.appendChild(el("div", {
      left: D.px(H.padX), top: D.py(H.padY + 0.45),
      width: D.px(H.w - H.padX * 2), height: D.py(0.3),
      fontSize: ptToCqw(D.FONTS.message.size), fontWeight: "400",
      color: "#" + D.COLORS.headerText, opacity: "0.85",
      display: "flex", alignItems: "center",
    }, sd.header.message));

    // ── グリッド計算 ──
    const grid = sd.grid || [];
    const numRows = grid.length;
    const numCols = Math.max(...grid.map(row =>
      row.reduce((sum, cell) => sum + (cell.span || 1), 0)
    ));

    const mainX = D.mainPadX;
    const mainW = D.slideW - D.mainPadX * 2;
    const contentY = D.headerH + D.mainPadY;
    const contentH = D.footerY - D.headerH - D.mainPadY * 2;
    const gap = D.gridGap;

    const ratios = sd.rowHeightRatios || Array(numRows).fill(1 / numRows);
    const rowHeights = ratios.map(r => contentH * r);

    const unitW = (mainW - gap * (numCols + 1)) / numCols;
    const cellX = (col) => mainX + gap + col * (unitW + gap);
    const cellW = (span) => unitW * span + gap * (span - 1);
    const rowTop = (row) => contentY + rowHeights.slice(0, row).reduce((a, b) => a + b, 0);
    const cellY = (row) => rowTop(row) + (row === 0 ? gap : gap / 2);
    const cellH = (row) => rowHeights[row] - (row === 0 ? gap : gap / 2) - (row === numRows - 1 ? gap : gap / 2);

    // ── セルの描画 ──
    for (let row = 0; row < numRows; row++) {
      const cells = grid[row];
      let col = 0;
      for (const cell of cells) {
        const span = cell.span || 1;
        const cx = cellX(col), cy = cellY(row);
        const cw = cellW(span), ch = cellH(row);

        if (cell.type === "section") {
          slide.appendChild(el("div", {
            left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch),
            background: "#" + D.COLORS.bgBox,
            borderWidth: "1px", borderStyle: "solid", borderColor: "#" + D.COLORS.border,
            borderRadius: "3px",
          }));
          const padX = D.cardPadX, padY = D.cardPadY;
          const bgBox = el("div", {
            left: D.px(cx + padX), top: D.py(cy + padY),
            width: D.px(cw - padX * 2), height: D.py(ch - padY * 2),
            overflow: "hidden",
          });
          bgBox.classList.add("md-bg");
          bgBox.innerHTML = marked.parse(cell.markdown || cell.text || "");
          slide.appendChild(bgBox);

        } else if (cell.type === "conclusion") {
          const accentW = D.conclusionAccentW;
          const padX = D.cardPadX, padY = D.cardPadY;
          slide.appendChild(el("div", {
            left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch),
            background: "#" + D.COLORS.conclusionBg,
            borderWidth: "1.5px", borderStyle: "solid", borderColor: "#" + D.COLORS.conclusionBorder,
            borderRadius: "4px",
          }));
          slide.appendChild(el("div", {
            left: D.px(cx), top: D.py(cy),
            width: D.px(accentW), height: D.py(ch),
            background: "#" + D.COLORS.conclusionBorder,
            borderRadius: "4px 0 0 4px",
          }));
          const box = el("div", {
            left: D.px(cx + accentW + padX), top: D.py(cy + padY),
            width: D.px(cw - accentW - padX * 2), height: D.py(ch - padY * 2),
            overflow: "hidden",
          });
          box.classList.add("md-concl");
          box.innerHTML = marked.parse(cell.markdown || cell.text || "");
          slide.appendChild(box);

        } else if (cell.type === "plain") {
          const padX = D.headerPadX, padY = D.mainPadY;
          const box = el("div", {
            left: D.px(cx + padX), top: D.py(cy + padY),
            width: D.px(cw - padX * 2), height: D.py(ch - padY * 2),
            overflow: "hidden",
          });
          box.classList.add("md-plain");
          box.innerHTML = marked.parse(cell.markdown || "");
          slide.appendChild(box);

          const cellIdx = cells.indexOf(cell);
          const nextCell = cells[cellIdx + 1];
          if (col + span < numCols && !(nextCell && nextCell.type === "image")) {
            slide.appendChild(el("div", {
              left: D.px(cx + cw + gap / 2), top: D.py(cy),
              width: "1px", height: D.py(ch),
              background: "#" + D.COLORS.border,
            }));
          }

        } else if (cell.type === "image") {
          const src = cell.src || "";
          const label = cell.label || "画像 / Image";

          slide.appendChild(el("div", {
            left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch),
            background: "#" + D.COLORS.surface,
            borderWidth: "1px", borderStyle: "solid", borderColor: "#" + D.COLORS.border,
            overflow: "hidden",
          }));

          if (src) {
            const img = document.createElement("img");
            img.src = src;
            img.setAttribute("data-role", "element");
            Object.assign(img.style, {
              position: "absolute",
              left: D.px(cx), top: D.py(cy),
              width: D.px(cw), height: D.py(ch),
              objectFit: "cover",
            });
            slide.appendChild(img);
          } else {
            slide.appendChild(el("div", {
              left: D.px(cx), top: D.py(cy),
              width: D.px(cw), height: D.py(ch),
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: ptToCqw(D.FONTS.bodyText.size),
              color: "#" + D.COLORS.textMuted,
            }, label));
          }

        } else if (cell.type === "card") {
          slide.appendChild(el("div", {
            left: D.px(cx), top: D.py(cy), width: D.px(cw), height: D.py(ch),
            background: "#" + D.COLORS.surface,
            borderWidth: "1px", borderStyle: "solid", borderColor: "#" + D.COLORS.border,
          }));
          const { title, items } = parseCardMarkdown(cell.markdown || "");
          const padX = D.cardPadX, padY = D.cardPadY;
          if (title) {
            slide.appendChild(el("div", {
              left: D.px(cx + padX), top: D.py(cy + padY),
              width: D.px(cw - padX * 2), height: D.py(0.35),
              fontSize: ptToCqw(D.FONTS.cardTitle.size), fontWeight: "700",
              color: "#" + D.COLORS.text,
              display: "flex", alignItems: "center", overflow: "hidden",
            }, title));
            slide.appendChild(el("div", {
              left: D.px(cx + padX), top: D.py(cy + D.cardDivY),
              width: D.px(cw - padX * 2), height: D.py(0.007),
              background: "#" + D.COLORS.border,
            }));
          }
          if (items.length > 0) {
            const bodyY = cy + (title ? D.cardDivY + 0.08 : padY);
            const bodyH = cy + ch - bodyY - padY;
            const box = el("div", {
              left: D.px(cx + padX), top: D.py(bodyY),
              width: D.px(cw - padX * 2), height: D.py(bodyH),
              fontSize: ptToCqw(D.FONTS.cardBody.size),
              color: "#" + D.COLORS.text, overflow: "hidden",
            });
            box.classList.add("md-card");
            let html = "";
            for (const item of items) {
              html += item.type === "bullet" ? `<li>${item.text}</li>` : `<p>${item.text}</p>`;
            }
            box.innerHTML = html.includes("<li>") ? `<ul>${html}</ul>` : html;
            slide.appendChild(box);
          }
        }
        col += span;
      }
    }

    // ── フッター ──
    slide.appendChild(el("div", {
      left: D.px(0), top: D.py(D.footerY),
      width: D.px(D.slideW), height: D.py(0.0071),
      background: "#" + D.COLORS.border,
    }));
    const footerRow = el("div", {
      left: D.px(D.footerPadX), top: D.py(D.footerY),
      width: D.px(D.slideW - D.footerPadX * 2), height: D.py(D.footerH),
      display: "flex", alignItems: "center", justifyContent: "space-between",
    });
    const pageSpan = document.createElement("span");
    pageSpan.textContent = sd.page;
    pageSpan.style.fontSize = ptToCqw(D.FONTS.footer.size);
    pageSpan.style.color = "#" + D.COLORS.textMuted;
    footerRow.appendChild(pageSpan);
    const logo = document.createElement("img");
    logo.src = sd.logo; logo.alt = "Logo";
    logo.style.height = (D.logoH / D.slideW * 100) + "cqw";
    logo.style.width = "auto"; logo.style.objectFit = "contain";
    footerRow.appendChild(logo);
    slide.appendChild(footerRow);
  });
})();

function el(tag, styles, text) {
  const e = document.createElement(tag);
  e.setAttribute("data-role", "element");
  Object.assign(e.style, { position: "absolute", ...styles });
  if (text) e.textContent = text;
  return e;
}
</script>
</body>
</html>
