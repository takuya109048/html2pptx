<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Slide (Cover)</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #e8e8e8; }
  .slide-wrapper {
    width: 100%; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  .slide {
    aspect-ratio: 16 / 9;
    width: min(100vh * 16 / 9, 100vw);
    max-height: 100vh;
    position: relative;
    background: #fff;
    overflow: hidden;
    container-type: inline-size;
  }
  .slide [data-role] { position: absolute; }
</style>
</head>
<body>
<div class="slide-wrapper">
  <div class="slide" id="slide"></div>
</div>

<script>
// =====================================================
// ここを編集してスライドをカスタマイズしてください
// =====================================================

// ── テキスト内容 ──────────────────────────────────
// title        スライドタイトル
// affiliation  所属
// presenter    発表者氏名
// date         日付
// bg           背景画像ファイル名
const SLIDES = [
  {
    "title":       "タイトル A-01\n/ Title Placeholder",
    "affiliation": "所属 X-01 / Affiliation",
    "presenter":   "発表者 Y-01 / Presenter Name",
    "date":        "Date Z-01 / 2026-00-00",
    "bg":          "background.png"
  }
]; // END_SLIDES

// ── デザイン（色・フォント） ─────────────────────
// 色は 16進数6桁（# なし）で指定
// フォントサイズはポイント数（数値）で指定
const DESIGN = {
  "COLORS": {
    "title":   "000000",  // タイトルテキストの色
    "divider": "000000",  // 区切り線の色
    "meta":    "333333"   // 所属・発表者・日付の色
  },
  "FONTS": {
    "family":    "Segoe UI",                        // 欧文フォント名（和文は常に Meiryo）
    "title":     { "size": 28, "bold": true  },     // タイトル
    "meta":      { "size": 16, "bold": false }      // 所属・発表者・日付
  }
}; // END_DESIGN

// =====================================================
// 以下はテンプレート（通常は編集不要）
// =====================================================

const W = 10, H = 5.625;
const px = (inch) => (inch / W * 100) + "%";
const py = (inch) => (inch / H * 100) + "%";

const D = {
  "SLIDE_W":    10.0,
  "SLIDE_H":    5.625,
  "CONTENT_X":  0.5,
  "CONTENT_W":  5.5,
  "DIVIDER_X":  0.5,
  "DIVIDER_W":  4.0,
  "DIVIDER_Y":  2.81,
  "TITLE_Y":    1.36,
  "TITLE_H":    1.35,
  "META_ITEMS": [
    { "key": "affiliation", "y": 3.01 },
    { "key": "presenter",   "y": 3.36 },
    { "key": "date",        "y": 3.71 }
  ]
};

D.COLORS = DESIGN.COLORS;
D.FONTS  = DESIGN.FONTS;

(D => {
  const slide = document.getElementById("slide");
  slide.style.fontFamily = `"${D.FONTS.family}", "Meiryo", sans-serif`;

  const ptToCqw = (pt) => (pt / 720 * 100) + "cqw";
  const pxToCqw = (px) => (px / 960 * 100) + "cqw";

  SLIDES.forEach(sd => {
    // ── 背景画像 ──
    const bg = document.createElement("img");
    bg.src = sd.bg;
    bg.setAttribute("data-role", "element");
    Object.assign(bg.style, {
      position: "absolute",
      left: "0", top: "0", width: "100%", height: "100%",
      objectFit: "cover",
    });
    slide.appendChild(bg);

    // ── タイトル ──
    slide.appendChild(el("div", {
      left: px(D.CONTENT_X), top: py(D.TITLE_Y),
      width: px(D.CONTENT_W), height: py(D.TITLE_H),
      display: "flex", alignItems: "center",
      fontSize: ptToCqw(D.FONTS.title.size),
      fontWeight: D.FONTS.title.bold ? "700" : "400",
      color: "#" + D.COLORS.title,
      lineHeight: "1.4",
      whiteSpace: "pre-wrap",
      wordWrap: "break-word",
    }, sd.title));

    // ── 区切り線 ──
    slide.appendChild(el("div", {
      left: px(D.DIVIDER_X), top: py(D.DIVIDER_Y),
      width: px(D.DIVIDER_W), height: pxToCqw(1),
      background: "#" + D.COLORS.divider,
    }));

    // ── 所属・発表者・日付 ──
    D.META_ITEMS.forEach(item => {
      slide.appendChild(el("div", {
        left: px(D.CONTENT_X), top: py(item.y),
        width: px(D.CONTENT_W), height: py(0.35),
        display: "flex", alignItems: "center",
        fontSize: ptToCqw(D.FONTS.meta.size),
        fontWeight: D.FONTS.meta.bold ? "700" : "400",
        color: "#" + D.COLORS.meta,
      }, sd[item.key]));
    });
  });
})(D);

function el(tag, styles, text) {
  const e = document.createElement(tag);
  e.setAttribute("data-role", "element");
  Object.assign(e.style, { position: "absolute", ...styles });
  if (text) e.textContent = text;
  return e;
}
</script>
</body>
</html>
