<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Slide (Flow 3 Steps)</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #e8e8e8; }
  .slide-wrapper {
    width: 100%; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  .slide {
    aspect-ratio: 16 / 9;
    width: min(100vh * 16 / 9, 100vw);
    max-height: 100vh;
    position: relative;
    background: #fff;
    overflow: hidden;
    container-type: inline-size;
  }
  .slide [data-role] { position: absolute; }
</style>
</head>
<body>
<div class="slide-wrapper">
  <div class="slide" id="slide"></div>
</div>

<script>
// =====================================================
// ここを編集してスライドをカスタマイズしてください
// =====================================================

// ── テキスト内容 ──────────────────────────────────
// header.title    ヘッダーの大きいタイトル
// header.message  ヘッダーの小さいサブタイトル
// steps[].label   各矢印に表示するラベル
// steps[].bullets 矢印下の箇条書き（配列）
// page            フッター左端のページ番号表示
// logo            フッター右端に表示する画像ファイル名
const SLIDES = [
  {
    "header": {
      "title": "フロー図",
      "message": "各ステップの進行フロー"
    },
    "steps": [
      {
        "label": "ステップ1",
        "bullets": ["箇条書き項目", "箇条書き項目", "箇条書き項目"]
      },
      {
        "label": "ステップ2",
        "bullets": ["箇条書き項目", "箇条書き項目", "箇条書き項目"]
      },
      {
        "label": "ステップ3",
        "bullets": ["箇条書き項目", "箇条書き項目", "箇条書き項目"]
      }
    ],
    "page": "1 / 1",
    "logo": "logo.png"
  }
]; // END_SLIDES

// ── デザイン（色・フォント） ─────────────────────
// 色は 16進数6桁（# なし）で指定
// フォントサイズはポイント数（数値）で指定
const DESIGN = {
  "COLORS": {
    "headerBg":   "4A4A4A",  // ヘッダー帯の背景色
    "headerText": "FFFFFF",  // ヘッダーの文字色
    "bg":         "FFFFFF",  // スライド全体の背景色
    "stepFill":   "D0D0D0",  // 矢印の塗り色
    "stepText":   "333333",  // 矢印内テキスト色
    "text":       "333333",  // 本文テキストの色
    "border":     "E0E0E0",  // 区切り線の色
    "textMuted":  "888888"   // フッター（ページ番号）の色
  },
  "FONTS": {
    "family":    "Segoe UI",                        // 欧文フォント名（和文は常に Meiryo）
    "title":     { "size": 24, "bold": true  },     // ヘッダータイトル
    "message":   { "size": 12, "bold": false },     // ヘッダーサブタイトル
    "stepLabel": { "size": 14, "bold": true  },     // 矢印内ラベル
    "bullet":    { "size": 11, "bold": false },     // 箇条書き本文
    "footer":    { "size": 10, "bold": false }      // フッターのページ番号
  }
}; // END_DESIGN

// =====================================================
// 以下はテンプレート（通常は編集不要）
// =====================================================

const W = 10, H = 5.625;
const px = (inch) => (inch / W * 100) + "%";
const py = (inch) => (inch / H * 100) + "%";

const D = {
  "SLIDE_W": 10.0,
  "SLIDE_H": 5.625,
  "HEADER": { "x": 0, "y": 0, "w": 10.0, "h": 0.85, "padX": 0.25, "padY": 0.08 },
  "STEPS": [
    { "x": 0.25,  "y": 1.1, "w": 3.05, "h": 1.1 },
    { "x": 3.475, "y": 1.1, "w": 3.05, "h": 1.1 },
    { "x": 6.7,   "y": 1.1, "w": 3.05, "h": 1.1 }
  ],
  "BULLETS_Y": 2.35,
  "BULLET_SPACING": 0.6,
  "FOOTER": { "x": 0, "y": 5.225, "w": 10.0, "h": 0.4, "padX": 0.25 },
  "LOGO_H": 0.25
};

D.COLORS = DESIGN.COLORS;
D.FONTS  = DESIGN.FONTS;

(D => {
  const slide = document.getElementById("slide");
  slide.style.fontFamily = `"${D.FONTS.family}", "Meiryo", sans-serif`;
  slide.style.color = "#" + D.COLORS.text;

  const ptToCqw = (pt) => (pt / 720 * 100) + "cqw";
  const pxToCqw = (px) => (px / 960 * 100) + "cqw";

  const mdStyle = document.createElement("style");
  mdStyle.textContent = `
    .flow-bullets {
      padding-left: 1.4em;
      font-size: ${ptToCqw(D.FONTS.bullet.size)};
      line-height: 1.8;
      overflow: hidden;
      margin: 0;
      color: #${D.COLORS.text};
    }
    .flow-bullets li { margin-bottom: 0.3em; }
  `;
  document.head.appendChild(mdStyle);

  SLIDES.forEach(sd => {
    const L = D.HEADER;

    // ── ヘッダー帯 ──
    slide.appendChild(el("div", {
      left: px(L.x), top: py(L.y), width: px(L.w), height: py(L.h),
      background: "#" + D.COLORS.headerBg,
    }));
    slide.appendChild(el("div", {
      left: px(L.padX), top: py(L.padY),
      width: px(L.w - L.padX * 2), height: py(0.45),
      fontSize: ptToCqw(D.FONTS.title.size),
      fontWeight: D.FONTS.title.bold ? "700" : "400",
      color: "#" + D.COLORS.headerText,
      display: "flex", alignItems: "center",
    }, sd.header.title));
    slide.appendChild(el("div", {
      left: px(L.padX), top: py(L.padY + 0.45),
      width: px(L.w - L.padX * 2), height: py(0.3),
      fontSize: ptToCqw(D.FONTS.message.size),
      fontWeight: D.FONTS.message.bold ? "700" : "400",
      color: "#" + D.COLORS.headerText, opacity: "0.85",
      display: "flex", alignItems: "center",
    }, sd.header.message));

    // ── 矢印（ステップ） ──
    sd.steps.forEach((step, i) => {
      const s = D.STEPS[i];
      if (!s) return;

      // 矢印シェイプ（枠線層 + 塗り層の2レイヤー構成）
      const be = 0.015;
      slide.appendChild(el("div", {
        left: px(s.x - be), top: py(s.y - be),
        width: px(s.w + be * 2), height: py(s.h + be * 2),
        background: "#CCCCCC",
        clipPath: "polygon(0 0, 88% 0, 100% 50%, 88% 100%, 0 100%)",
      }));
      slide.appendChild(el("div", {
        left: px(s.x), top: py(s.y), width: px(s.w), height: py(s.h),
        background: "#" + D.COLORS.stepFill,
        clipPath: "polygon(0 0, 88% 0, 100% 50%, 88% 100%, 0 100%)",
        display: "flex", alignItems: "center", justifyContent: "center",
        paddingRight: "12%",
        fontSize: ptToCqw(D.FONTS.stepLabel.size),
        fontWeight: D.FONTS.stepLabel.bold ? "700" : "400",
        color: "#" + D.COLORS.stepText,
      }, step.label));

      // 箇条書きボックス（カードと同スタイル）
      const bh = D.FOOTER.y - D.BULLETS_Y - 0.1;
      const cp = { x: 0.1, y: 0.1 };
      slide.appendChild(el("div", {
        left: px(s.x), top: py(D.BULLETS_Y),
        width: px(s.w), height: py(bh),
        background: "#F5F5F5",
        border: pxToCqw(1) + " solid #E0E0E0",
        borderRadius: pxToCqw(3),
      }));

      // 箇条書き本文
      const ul = el("ul", {
        left: px(s.x + cp.x), top: py(D.BULLETS_Y + cp.y),
        width: px(s.w - cp.x * 2), height: py(bh - cp.y * 2),
      });
      ul.classList.add("flow-bullets");
      step.bullets.forEach(bullet => {
        const li = document.createElement("li");
        li.textContent = bullet;
        ul.appendChild(li);
      });
      slide.appendChild(ul);
    });

    // ── フッター ──
    const F = D.FOOTER;
    slide.appendChild(el("div", {
      left: px(0), top: py(F.y),
      width: px(F.w), height: pxToCqw(1),
      background: "#" + D.COLORS.border,
    }));
    const footerRow = el("div", {
      left: px(F.padX), top: py(F.y),
      width: px(F.w - F.padX * 2), height: py(F.h),
      display: "flex", alignItems: "center", justifyContent: "space-between",
    });

    const pageSpan = document.createElement("span");
    pageSpan.textContent = sd.page;
    pageSpan.style.fontSize = ptToCqw(D.FONTS.footer.size);
    pageSpan.style.color = "#" + D.COLORS.textMuted;
    footerRow.appendChild(pageSpan);

    const logo = document.createElement("img");
    logo.src = sd.logo;
    logo.alt = "Logo";
    logo.style.height = (D.LOGO_H / D.SLIDE_W * 100) + "cqw";
    logo.style.width = "auto";
    logo.style.objectFit = "contain";
    footerRow.appendChild(logo);

    slide.appendChild(footerRow);
  });
})(D);

function el(tag, styles, text) {
  const e = document.createElement(tag);
  e.setAttribute("data-role", "element");
  Object.assign(e.style, { position: "absolute", ...styles });
  if (text) e.textContent = text;
  return e;
}
</script>
</body>
</html>
